<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石膏图转视频（分离操作版）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .btn-group{gap:8px; display:flex; margin-top:10px}
  button{padding:12px; border-radius:8px; border:none; cursor:pointer}
  .primary{background:#0071e3; color:white}
  .success{background:#34c759; color:white}
  .default{background:#8e8e93; color:white}
</style>
</head>
<body class="max-w-4xl mx-auto p-6 bg-gray-50">
<h1 class="text-2xl font-bold text-center mb-6">🎬 即梦3.0 Pro - 分离操作版</h1>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <label class="block mb-2 font-medium">选择本地图片：</label>
  <input type="file" id="fileInput" accept="image/*" class="w-full p-3 border rounded mb-4">
  <div class="btn-group">
    <button id="submitBtn" class="primary">上传并提交视频任务</button>
    <button id="queryBtn" class="success" disabled>查询任务结果</button>
    <button id="resetBtn" class="default">重置</button>
  </div>
</div>

<!-- 任务ID展示 -->
<div class="bg-white p-6 rounded-lg shadow mb-6" id="taskBox" style="display:none;">
  <p class="font-bold">当前任务ID：<span id="taskId"></span></p>
  <p class="text-gray-500 text-sm">等待生成完成后，点击「查询任务结果」</p>
</div>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <h3>运行日志</h3>
  <div id="log" class="h-48 bg-gray-100 p-3 rounded text-sm mt-2 overflow-y-auto"></div>
</div>

<div class="bg-white p-6 rounded-lg shadow">
  <h3>视频结果</h3>
  <div id="result" class="mt-2"></div>
</div>

<script>
// 官方配置
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const UPLOAD_API = "https://api.302.ai/302/upload-file";
const VIDEO_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro";
const QUERY_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro_result";
const VIDEO_PROMPT = "将参考图片生成视频 视频要从侧面开始 转动到正上方 再转动到另一边的正侧方 再转到正脸 最后视频推近展示脸部特写 转动过程中脸要始终在画面里呈现 不要背对画面 丝滑蓬松长发 皮肤白净无杂色 小幅转动 流畅运镜 柔和光影 石膏质感";
const VIDEO_CONFIG = { frames: 121, aspect_ratio: "1:1" };

// DOM
const fileInput = document.getElementById("fileInput");
const submitBtn = document.getElementById("submitBtn");
const queryBtn = document.getElementById("queryBtn");
const resetBtn = document.getElementById("resetBtn");
const taskBox = document.getElementById("taskBox");
const taskIdSpan = document.getElementById("taskId");
const logBox = document.getElementById("log");
const resultBox = document.getElementById("result");

let currentTaskId = "";

// 日志
function log(text) {
  logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}

// 重置
function reset(){
  currentTaskId = "";
  fileInput.value = "";
  taskBox.style.display = "none";
  queryBtn.disabled = true;
  submitBtn.disabled = false;
  resultBox.innerHTML = "";
  logBox.innerHTML = "";
}

// 1. 上传图片
async function uploadFile(file) {
  log("📤 上传图片到官方接口...");
  const form = new FormData();
  form.append("file", file);
  const res = await fetch(UPLOAD_API, { method: "POST", headers: { Authorization: `Bearer ${API_KEY}` }, body: form });
  const data = await res.json();
  if (data.code !== 200) throw new Error(data.message);
  log(`✅ 图片URL：${data.data}`);
  return data.data;
}

// 2. 提交任务
async function createTask(imgUrl) {
  log("🚀 提交视频生成任务...");
  const res = await fetch(VIDEO_API, {
    method: "POST",
    headers: { Authorization: `Bearer ${API_KEY}`, "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: VIDEO_PROMPT, image_urls: [imgUrl], ...VIDEO_CONFIG })
  });
  const data = await res.json();
  const taskId = data?.data?.task_id;
  if (!taskId) throw new Error("任务提交失败");
  log(`✅ 任务提交成功！ID：${taskId}`);
  return taskId;
}

// 3. 查询任务（手动）
async function queryTask() {
  log("🔍 手动查询任务状态...");
  const res = await fetch(QUERY_API, {
    method: "POST",
    headers: { Authorization: `Bearer ${API_KEY}`, "Content-Type": "application/json" },
    body: JSON.stringify({ task_id: currentTaskId })
  });
  const data = await res.json();
  const status = data.data.status;
  log(`📊 当前状态：${status}`);

  if(status === "succeeded"){
    const videoUrl = data.data.video_url;
    resultBox.innerHTML = `
      <p class="text-green-600 font-bold">✅ 生成成功！</p>
      <video controls class="w-full rounded mt-2"><source src="${videoUrl}" type="video/mp4"></video>
      <a href="${videoUrl}" target="_blank" class="text-blue-500">打开视频</a>
    `;
  }else if(status === "failed"){
    resultBox.innerHTML = `<p class="text-red-600">❌ 生成失败</p>`;
  }else{
    resultBox.innerHTML = `<p class="text-orange-600">⏳ 正在生成中，请稍后再查询</p>`;
  }
}

// 事件
submitBtn.onclick = async () => {
  const file = fileInput.files[0];
  if(!file){ alert("请选择图片"); return; }
  submitBtn.disabled = true;
  try {
    const imgUrl = await uploadFile(file);
    currentTaskId = await createTask(imgUrl);
    taskIdSpan.innerText = currentTaskId;
    taskBox.style.display = "block";
    queryBtn.disabled = false;
  }catch(e){
    log(`❌ 错误：${e.message}`);
    submitBtn.disabled = false;
  }
};

queryBtn.onclick = queryTask;
resetBtn.onclick = reset;
</script>
</body>
</html>
