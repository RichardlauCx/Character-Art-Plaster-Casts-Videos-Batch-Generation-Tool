<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石膏图批量转视频（即梦3.0 Pro）</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-5xl mx-auto p-6 bg-gray-50">
<h1 class="text-2xl font-bold text-center mb-6">🎬 批量石膏图 → 即梦3.0 Pro 视频生成</h1>

<!-- 批量上传区域 -->
<div class="bg-white p-6 rounded-lg shadow mb-6">
    <label class="block mb-2 font-medium">批量选择本地石膏图（可多选）：</label>
    <input type="file" id="fileInput" accept="image/*" multiple 
           class="w-full p-3 border rounded mb-4">
    <div class="flex gap-3">
        <button id="submitBatchBtn" class="flex-1 bg-blue-600 text-white py-3 rounded">
            🚀 批量提交生成任务
        </button>
        <button id="queryBatchBtn" class="flex-1 bg-green-600 text-white py-3 rounded">
            🔍 批量查询所有任务
        </button>
        <button id="resetBtn" class="flex-1 bg-gray-500 text-white py-3 rounded">
            🔄 重置全部
        </button>
    </div>
</div>

<!-- 日志区域 -->
<div class="bg-white p-6 rounded-lg shadow mb-6">
    <h3 class="font-medium mb-2">运行日志</h3>
    <div id="log" class="h-32 bg-gray-100 p-3 rounded text-sm overflow-y-auto"></div>
</div>

<!-- 批量任务列表 -->
<div class="bg-white p-6 rounded-lg shadow">
    <h3 class="font-medium mb-4">批量任务列表</h3>
    <div id="taskList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</div>

<script>
// ====================== 官方接口配置（完全用你提供的文档）======================
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const UPLOAD_API = "https://api.302.ai/302/upload-file";
const VIDEO_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro";
const QUERY_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro_result";

const VIDEO_PROMPT = "将参考图片生成视频 视频要从侧面开始 转动到正上方 再转动到另一边的正侧方 再转到正脸 最后视频推近展示脸部特写 转动过程中脸要始终在画面里呈现 不要背对画面 丝滑蓬松长发 皮肤白净无杂色 小幅转动 流畅运镜 柔和光影 石膏质感";
const VIDEO_CONFIG = { frames: 121, aspect_ratio: "1:1" };

// ====================== 全局变量 ======================
let taskList = []; // 批量任务列表
const fileInput = document.getElementById("fileInput");
const submitBatchBtn = document.getElementById("submitBatchBtn");
const queryBatchBtn = document.getElementById("queryBatchBtn");
const resetBtn = document.getElementById("resetBtn");
const logBox = document.getElementById("log");
const taskListDom = document.getElementById("taskList");

// 日志输出
function log(text) {
    logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

// 重置
function resetAll() {
    taskList = [];
    fileInput.value = "";
    taskListDom.innerHTML = "";
    logBox.innerHTML = "";
}

// 渲染任务卡片
function renderTaskList() {
    taskListDom.innerHTML = "";
    taskList.forEach((task, index) => {
        const card = document.createElement("div");
        card.className = "border rounded p-4 bg-white shadow-sm";
        
        let statusText = "";
        let statusColor = "";
        if(task.status === "pending") {
            statusText = "待查询";
            statusColor = "text-gray-600";
        } else if(task.status === "processing") {
            statusText = "生成中";
            statusColor = "text-blue-600";
        } else if(task.status === "succeeded") {
            statusText = "已完成";
            statusColor = "text-green-600";
        } else if(task.status === "failed") {
            statusText = "生成失败";
            statusColor = "text-red-600";
        }

        card.innerHTML = `
            <p class="text-sm font-medium mb-1">文件：${task.fileName}</p>
            <p class="text-xs mb-1 ${statusColor}">状态：${statusText}</p>
            <p class="text-xs text-gray-500 break-all mb-2">TaskID：${task.taskId || "未生成"}</p>
            ${task.videoUrl ? `
            <div class="mt-2">
                <video controls class="w-full h-32 object-cover rounded mb-1">
                    <source src="${task.videoUrl}" type="video/mp4">
                </video>
                <p class="text-xs text-blue-600 break-all">URL：${task.videoUrl}</p>
                <button onclick="navigator.clipboard.writeText('${task.videoUrl}')" 
                        class="text-xs bg-gray-100 px-2 py-1 rounded mt-1">
                    复制链接
                </button>
            </div>
            ` : ""}
        `;
        taskListDom.appendChild(card);
    });
}

// ====================== 1. 官方文件上传 ======================
async function uploadFile(file) {
    const form = new FormData();
    form.append("file", file);
    const res = await fetch(UPLOAD_API, {
        method: "POST",
        headers: { Authorization: `Bearer ${API_KEY}` },
        body: form
    });
    const data = await res.json();
    if(data.code !== 200) throw new Error(data.message);
    return data.data;
}

// ====================== 2. 提交单个视频任务 ======================
async function createSingleTask(imgUrl) {
    const res = await fetch(VIDEO_API, {
        method: "POST",
        headers: {
            Authorization: `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            prompt: VIDEO_PROMPT,
            image_urls: [imgUrl],
            ...VIDEO_CONFIG
        })
    });
    const data = await res.json();
    return data?.data?.task_id;
}

// ====================== 3. 批量提交任务 ======================
async function submitBatchTasks() {
    const files = Array.from(fileInput.files);
    if(files.length === 0) {
        alert("请先选择图片");
        return;
    }

    submitBatchBtn.disabled = true;
    taskList = files.map(file => ({
        fileName: file.name,
        file: file,
        taskId: "",
        status: "pending",
        videoUrl: ""
    }));
    renderTaskList();

    // 串行批量提交（防止API限流）
    for(let i=0; i<taskList.length; i++) {
        try {
            log(`正在处理第${i+1}张：${taskList[i].fileName}`);
            const imgUrl = await uploadFile(taskList[i].file);
            const taskId = await createSingleTask(imgUrl);
            taskList[i].taskId = taskId;
            taskList[i].status = "processing";
            log(`第${i+1}张任务提交成功：${taskId}`);
            renderTaskList();
        } catch(e) {
            taskList[i].status = "failed";
            log(`第${i+1}张处理失败：${e.message}`);
            renderTaskList();
        }
    }

    submitBatchBtn.disabled = false;
    log("✅ 批量任务提交完成");
}

// ====================== 4. 查询单个任务 ======================
async function querySingleTask(taskId) {
    const res = await fetch(QUERY_API, {
        method: "POST",
        headers: {
            Authorization: `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ task_id: taskId })
    });
    return await res.json();
}

// ====================== 5. 批量查询所有任务 ======================
async function queryBatchTasks() {
    if(taskList.length === 0) {
        alert("暂无任务可查询");
        return;
    }

    queryBatchBtn.disabled = true;
    for(let i=0; i<taskList.length; i++) {
        const task = taskList[i];
        if(!task.taskId || task.status === "succeeded") continue;

        try {
            log(`查询第${i+1}张任务：${task.taskId}`);
            const res = await querySingleTask(task.taskId);
            const status = res.data.status;
            task.status = status;

            if(status === "succeeded") {
                task.videoUrl = res.data.video_url;
                log(`第${i+1}张任务完成：${task.videoUrl}`);
            }
            renderTaskList();
        } catch(e) {
            task.status = "failed";
            log(`第${i+1}张查询失败：${e.message}`);
            renderTaskList();
        }
    }
    queryBatchBtn.disabled = false;
    log("✅ 批量查询完成");
}

// ====================== 绑定事件 ======================
submitBatchBtn.addEventListener("click", submitBatchTasks);
queryBatchBtn.addEventListener("click", queryBatchTasks);
resetBtn.addEventListener("click", resetAll);
</script>
</body>
</html>
