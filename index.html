<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石膏图转视频（官方上传接口·修复版）</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-4xl mx-auto p-6 bg-gray-50">
<h1 class="text-2xl font-bold text-center mb-6">🎬 本地文件 → 官方上传 → 视频生成</h1>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <label class="block mb-2 font-medium">选择本地石膏图：</label>
  <input type="file" id="fileInput" accept="image/*" class="w-full p-3 border rounded mb-4">
  <button id="startBtn" class="bg-blue-600 text-white px-6 py-3 rounded w-full disabled:bg-gray-400" disabled>
    🚀 开始生成
  </button>
</div>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <h3>运行日志</h3>
  <div id="log" class="h-48 bg-gray-100 p-3 rounded text-sm mt-2 overflow-y-auto"></div>
</div>

<div class="bg-white p-6 rounded-lg shadow">
  <h3>结果</h3>
  <div id="result" class="mt-2"></div>
</div>

<script>
// ====================== 你的配置 ======================
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const UPLOAD_API = "https://api.302.ai/302/upload-file";
const VIDEO_API = "https://api.302.ai/doubao/drawing/jimengv30";
const REQ_KEY = "jimeng_i2v_recamera_v30";
const VIDEO_PROMPT = "将参考图片生成视频 视频要从侧面开始 转动到正上方 再转动到另一边的正侧方 再转到正脸 最后视频推近展示脸部特写 转动过程中脸要始终在画面里呈现 不要背对画面 丝滑蓬松长发 皮肤白净无杂色 小幅转动 流畅运镜 柔和光影 石膏质感无水印，无文字，静态图片转动态 平稳无抖动 在每次转动到一个视角时停留1-2秒左右展示一下再进行下步转动 视频运行是不能让人物看着出现变形（不能改变人物特征） 转动中可以眨一眨眼睛动一动头 让视频更生动自然";
const VIDEO_CONFIG = { duration: 3, ratio: "1:1", fps: 24 };

// ====================== 工具 ======================
const $ = document.querySelector.bind(document);
const fileInput = $("#fileInput");
const startBtn = $("#startBtn");
const logBox = $("#log");
const resultBox = $("#result");

function log(text) {
  logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}

// ====================== 官方文件上传（完全正常，无修改）======================
async function uploadFile(file) {
  log("📤 正在上传到官方接口...");
  const form = new FormData();
  form.append("file", file);

  const res = await fetch(UPLOAD_API, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${API_KEY}`
    },
    body: form
  });

  const data = await res.json();
  log(`上传返回：${JSON.stringify(data)}`);

  if (data.code !== 200) {
    throw new Error(data.message || "上传失败");
  }

  const imgUrl = data.data;
  log(`✅ 获得官方URL：${imgUrl}`);
  return imgUrl;
}

// ====================== 【核心修复：视频生成+轮询逻辑】======================
async function generateVideo(imgUrl) {
  log("🚀 提交视频任务...");
  const body = {
    req_key: REQ_KEY,
    prompt: VIDEO_PROMPT,
    image_urls: [imgUrl],
    duration: VIDEO_CONFIG.duration,
    ratio: VIDEO_CONFIG.ratio,
    fps: VIDEO_CONFIG.fps
  };

  const res = await fetch(VIDEO_API, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  log(`视频接口返回：${JSON.stringify(data)}`);

  // 1. 同步返回场景（直接拿到视频URL）
  if (data?.data?.[0]?.url) {
    log("✅ 同步生成成功，直接获取视频URL");
    return data.data[0].url;
  }

  // 2. 异步任务场景（需要轮询，核心修复在这里）
  const taskId = data?.data?.task_id;
  if (!taskId) {
    throw new Error(`任务提交失败，未获取到task_id：${JSON.stringify(data)}`);
  }

  log(`⏳ 异步任务：${taskId}，开始轮询状态`);
  const taskUrl = `https://api.302.ai/doubao/tasks/${taskId}`;
  const maxRetries = 30; // 最多轮询30次（90秒）
  const retryDelay = 3000; // 每次间隔3秒

  for (let i = 0; i < maxRetries; i++) {
    await new Promise(r => setTimeout(r, retryDelay));

    try {
      // 【修复1：先判断响应状态，非200直接重试，不解析】
      const pollRes = await fetch(taskUrl, {
        headers: { "Authorization": `Bearer ${API_KEY}` }
      });

      if (!pollRes.ok) {
        log(`⚠️ 第${i+1}次轮询：服务暂时不可用（${pollRes.status}），3秒后重试`);
        continue; // 遇到503/500等错误，直接重试，不崩溃
      }

      const pollData = await pollRes.json();
      // 【修复2：用可选链?. 彻底避免空指针报错】
      const status = pollData?.data?.status;

      if (!status) {
        log(`⚠️ 第${i+1}次轮询：状态异常，响应：${JSON.stringify(pollData)}，3秒后重试`);
        continue;
      }

      log(`🔄 第${i+1}次轮询：任务状态 = ${status}`);

      // 任务成功
      if (status === "succeeded") {
        const videoUrl = pollData?.data?.url;
        if (!videoUrl) throw new Error("任务成功但未获取到视频URL");
        log("✅ 异步生成成功，获取视频URL");
        return videoUrl;
      }

      // 任务失败
      if (status === "failed") {
        const errorMsg = pollData?.data?.error?.message || "任务执行失败";
        throw new Error(errorMsg);
      }

      // 任务处理中（pending/processing），继续轮询
    } catch (e) {
      log(`⚠️ 第${i+1}次轮询异常：${e.message}，3秒后重试`);
      // 【修复3：捕获轮询中的异常，不崩溃，继续重试】
      continue;
    }
  }

  // 轮询超时
  throw new Error(`视频生成超时：最多轮询${maxRetries}次（${maxRetries * retryDelay / 1000}秒）`);
}

// ====================== 启动（无修改）======================
fileInput.addEventListener("change", () => {
  startBtn.disabled = !fileInput.files[0];
});

startBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  startBtn.disabled = true;
  resultBox.innerHTML = "";

  try {
    const imgUrl = await uploadFile(file);
    const videoUrl = await generateVideo(imgUrl);

    resultBox.innerHTML = `
      <p class="text-green-600 font-bold">✅ 成功</p>
      <video controls class="w-full rounded mt-2">
        <source src="${videoUrl}" type="video/mp4">
      </video>
      <a href="${videoUrl}" target="_blank" class="text-blue-500">打开视频</a>
    `;
    log("🎉 全部完成");
  } catch (e) {
    log(`❌ 失败：${e.message}`);
    resultBox.innerHTML = `<p class="text-red-600">失败：${e.message}</p>`;
  } finally {
    startBtn.disabled = false;
  }
});
</script>
</body>
</html>
