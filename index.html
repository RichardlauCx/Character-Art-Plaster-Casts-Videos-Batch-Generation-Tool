<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物石膏质感 + 3D运镜视频 批量生成</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{max-width:1000px;margin:30px auto;padding:0 20px;background:#f7f8fa}
        .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px #0000000d}
        .title{text-align:center;margin-bottom:24px;color:#222}
        .upload{border:2px dashed #4263fb;border-radius:12px;padding:24px;text-align:center;margin:20px 0}
        #fileInput{margin:12px 0}
        button{background:#4263fb;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin:0 6px}
        button:disabled{background:#ccc;cursor:not-allowed}
        .log{background:#f1f3f5;border-radius:8px;padding:16px;height:220px;overflow-y:auto;margin:16px 0;font-size:14px;line-height:1.6}
        .result{margin-top:24px}
        .item{border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin:16px 0}
        .item.success{border-left:4px solid #00c48c}
        .item.fail{border-left:4px solid #f43f5e}
        .preview{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
        .preview img,.preview video{width:180px;height:180px;object-fit:cover;border-radius:8px}
        .status{margin:6px 0;color:#555}
    </style>
</head>
<body>
    <div class="card">
        <h2 class="title">人物石膏质感 + 3D运镜视频 批量生成</h2>
        <div class="upload">
            <p>批量上传人物图片（Ctrl/Shift多选）</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <button id="start">开始批量处理</button>
            <button id="clear">清空日志</button>
        </div>
        <h3>处理日志</h3>
        <div class="log" id="log"></div>
        <div class="result" id="result"></div>
    </div>

<script>
// ====================== 配置 ======================
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const BASE = "https://api.302.ai";

// 1. 即梦图文生图
const IMG_API = BASE + "/doubao/images/generations";
const IMG_MODEL = "doubao-seedream-5-0-260128";
const IMG_PROMPT = "将图中人物转换为石膏质感，脸部细节清晰，头发蓬松丝滑，通体石膏白色，背景柔和影棚黑白渐变，无杂色无水印";

// 2. 即梦视频3.0 运镜
const VIDEO_API = BASE + "/doubao/drawing/jimengv30";
const VIDEO_PROMPT = "石膏质感人物，中心环绕运镜，流畅无抖动，脸部始终在画面，不变形，柔和光影，自然生动";
const VIDEO_REQ_KEY = "jimeng_i2v_recamera_v30";
const VIDEO_TPL = "central_orbit"; // 可尝试换成 "handheld" 降低压力
const VIDEO_CAMERA = "medium";    // 可尝试换成 "weak"
const VIDEO_FRAMES = 121;

// ====================== 工具函数 ======================
const $ = (s) => document.querySelector(s);
const log = (msg) => {
    const t = new Date().toLocaleTimeString();
    $("#log").innerHTML += `[${t}] ${msg}<br>`;
    $("#log").scrollTop = $("#log").scrollHeight;
};

function fileToBase64(file) {
    return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsDataURL(file);
    });
}

// ====================== 核心生成 ======================
async function genPlaster(imgBase64) {
    log("→ 生成石膏质感图...");
    const resp = await fetch(IMG_API, {
        method:"POST",
        headers:{
            Authorization:`Bearer ${API_KEY}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            model: IMG_MODEL,
            prompt: IMG_PROMPT,
            image: [imgBase64],
            size: "2K",
            max_images: 1,
            watermark: false,
            response_format: "url"
        })
    });
    const data = await resp.json();
    const url = data?.data?.[0]?.url;
    if(!url) throw new Error(data?.error?.message || "石膏图生成失败");
    log("✓ 石膏图生成完成");
    return url;
}

async function genVideo(plasterUrl) {
    log("→ 创建视频运镜任务...");
    const resp = await fetch(VIDEO_API, {
        method:"POST",
        headers:{
            Authorization:`Bearer ${API_KEY}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            prompt: VIDEO_PROMPT,
            req_key: VIDEO_REQ_KEY,
            image_urls: [plasterUrl],
            frames: VIDEO_FRAMES,
            template_id: VIDEO_TPL,
            camera_strength: VIDEO_CAMERA,
            aspect_ratio: "1:1"
        })
    });
    const data = await resp.json();
    if(data.code !== 10000) throw new Error(data.message || "创建任务失败");
    const taskId = data.data.task_id;
    log(`✓ 任务创建成功 task_id: ${taskId}`);
    return waitVideo(taskId);
}

// 修复后的轮询函数（增加失败重试机制）
async function waitVideo(taskId) {
    const maxRetries = 30;
    let retryCount = 0;

    while (retryCount < maxRetries) {
        try {
            log(`🔄 轮询视频任务 (尝试 ${retryCount + 1}/${maxRetries})...`);
            const resp = await fetch(`${BASE}/doubao/drawing/query_task`, {
                method: "POST",
                headers: {
                    Authorization: `Bearer ${API_KEY}`,
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ task_id: taskId }),
            });

            if (resp.status >= 500) {
                throw new Error(`服务繁忙 (${resp.status})`);
            }

            const data = await resp.json();
            
            if (data.code === 10000 && data.data?.video_url) {
                log("✅ 视频生成完成！");
                return data.data.video_url;
            }
            
            if (data.data?.status === "failed") {
                throw new Error("视频任务生成失败");
            }

            log("⏳ 任务仍在处理中，等待3秒...");
            retryCount++;
            await new Promise((r) => setTimeout(r, 3000));

        } catch (e) {
            log(`⚠️ 轮询失败：${e.message}，即将重试...`);
            retryCount++;
            await new Promise((r) => setTimeout(r, 3000));
        }
    }
    throw new Error("视频生成超时（已达到最大重试次数）");
}

// ====================== 批量处理 ======================
$("#start").onclick = async () => {
    const files = Array.from($("#fileInput").files);
    if(files.length === 0){ log("请选择图片"); return; }
    
    $("#start").disabled = true;
    $("#start").textContent = "处理中...";
    log(`开始处理 ${files.length} 张图片`);

    for(const [i,file] of files.entries()){
        const idx = i+1;
        try{
            log(`\n=== 第 ${idx}/${files.length} 张：${file.name} ==`);
            const base64 = await fileToBase64(file);
            const plaster = await genPlaster(base64);
            const video = await genVideo(plaster);
            
            $("#result").innerHTML += `
            <div class="item success">
                <p>✅ ${file.name} 处理成功</p>
                <div class="preview">
                    <div>原图<br><img src="${base64}"></div>
                    <div>石膏图<br><img src="${plaster}"></div>
                    <div>视频<br><video src="${video}" controls muted></video></div>
                </div>
            </div>`;
            log("✓ 全部完成");
        }catch(e){
            log(`✖ 失败：${e.message}`);
            $("#result").innerHTML += `
            <div class="item fail">
                <p>❌ ${file.name} 处理失败</p>
                <p>原因：${e.message}</p>
            </div>`;
        }
    }
    $("#start").disabled = false;
    $("#start").textContent = "开始批量处理";
    log("\n=== 全部任务结束 ===");
};

$("#clear").onclick = () => {
    $("#log").innerHTML = "";
    $("#result").innerHTML = "";
};
</script>
</body>
</html>
