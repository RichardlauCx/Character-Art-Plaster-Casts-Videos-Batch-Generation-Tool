<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石膏图转视频 - GitHub部署版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-4xl mx-auto p-6 bg-gray-50">
    <h1 class="text-2xl font-bold text-center mb-6">🎬 石膏图 → 视频生成工具</h1>

    <div class="bg-white p-6 rounded-lg shadow mb-6">
        <label class="block mb-2 font-medium">粘贴石膏图公网 URL（HTTPS 格式）：</label>
        <input 
            type="text" 
            id="imgUrl" 
            placeholder="https://xxx.png"
            class="w-full p-3 border rounded mb-4"
        >
        <button id="start" class="bg-blue-600 text-white px-6 py-3 rounded w-full">
            生成视频
        </button>
    </div>

    <div class="bg-white p-6 rounded-lg shadow mb-6">
        <h3>运行日志</h3>
        <div id="log" class="h-48 bg-gray-100 p-3 rounded text-sm mt-2 overflow-y-auto"></div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow">
        <h3>生成结果</h3>
        <div id="result" class="mt-2"></div>
    </div>

<script>
// 固定配置
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const VIDEO_API = "https://api.302.ai/doubao/drawing/jimengv30";
const REQ_KEY = "jimeng_i2v_recamera_v30";
const VIDEO_PROMPT = "将参考图片生成视频 视频要从侧面开始 转动到正上方 再转动到另一边的正侧方 再转到正脸 最后视频推近展示脸部特写 转动过程中脸要始终在画面里呈现 不要背对画面 丝滑蓬松长发 皮肤白净无杂色 小幅转动 流畅运镜 柔和光影 石膏质感无水印，无文字，静态图片转动态 平稳无抖动 在每次转动到一个视角时停留1-2秒左右展示一下再进行下步转动 视频运行是不能让人物看着出现变形（不能改变人物特征） 转动中可以眨一眨眼睛动一动头 让视频更生动自然";
const VIDEO_CONFIG = { duration: 3, ratio: "1:1", fps: 24 };

// 日志
function log(text) {
    document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] ${text}\n`;
}

// 视频生成
async function start() {
    const url = document.getElementById('imgUrl').value.trim();
    if (!url || !url.startsWith('https://')) {
        alert("请输入有效的 HTTPS 石膏图链接");
        return;
    }

    const btn = document.getElementById('start');
    btn.disabled = true;
    btn.textContent = "生成中...";
    document.getElementById('result').innerHTML = "";

    try {
        log("提交视频任务...");
        const res = await fetch(VIDEO_API, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                req_key: REQ_KEY,
                prompt: VIDEO_PROMPT,
                image_urls: [url],
                duration: VIDEO_CONFIG.duration,
                ratio: VIDEO_CONFIG.ratio,
                fps: VIDEO_CONFIG.fps
            })
        });

        const data = await res.json();
        log("接口返回：" + JSON.stringify(data));

        let videoUrl = data?.data?.[0]?.url;
        if (!videoUrl && data?.data?.task_id) {
            log("异步任务生成中，轮询状态...");
            const taskId = data.data.task_id;
            for (let i=0; i<20; i++) {
                await new Promise(r => setTimeout(r, 3000));
                const poll = await fetch(`https://api.302.ai/doubao/tasks/${taskId}`, {
                    headers: { Authorization: `Bearer ${API_KEY}` }
                });
                const pData = await poll.json();
                if (pData.data.status === "succeeded") {
                    videoUrl = pData.data.url;
                    break;
                }
                if (pData.data.status === "failed") throw new Error("任务失败");
            }
        }

        if (!videoUrl) throw new Error("未获取到视频地址");

        document.getElementById('result').innerHTML = `
            <video controls class="w-full rounded"><source src="${videoUrl}" type="video/mp4"></video>
            <p class="mt-2"><a href="${videoUrl}" target="_blank" class="text-blue-500">打开视频</a></p>
        `;
        log("✅ 生成完成！");
    } catch (e) {
        log("❌ 错误：" + e.message);
        document.getElementById('result').innerHTML = `<p class="text-red-500">失败：${e.message}</p>`;
    } finally {
        btn.disabled = false;
        btn.textContent = "生成视频";
    }
}

document.getElementById('start').onclick = start;
</script>
</body>
</html>
