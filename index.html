<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石膏图转视频（即梦3.0 Pro 官方完整版）</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-4xl mx-auto p-6 bg-gray-50">
<h1 class="text-2xl font-bold text-center mb-6">🎬 本地文件 → 官方上传 → 即梦3.0 Pro</h1>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <label class="block mb-2 font-medium">选择本地石膏图：</label>
  <input type="file" id="fileInput" accept="image/*" class="w-full p-3 border rounded mb-4">
  <button id="startBtn" class="bg-blue-600 text-white px-6 py-3 rounded w-full disabled:bg-gray-400" disabled>
    🚀 生成5秒高清视频
  </button>
</div>

<div class="bg-white p-6 rounded-lg shadow mb-6">
  <h3>运行日志</h3>
  <div id="log" class="h-48 bg-gray-100 p-3 rounded text-sm mt-2 overflow-y-auto"></div>
</div>

<div class="bg-white p-6 rounded-lg shadow">
  <h3>视频结果</h3>
  <div id="result" class="mt-2"></div>
</div>

<script>
// ====================== 100% 官方配置 ======================
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";

// 官方文件上传接口（你提供）
const UPLOAD_API = "https://api.302.ai/302/upload-file";
// 官方视频提交接口（你提供）
const VIDEO_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro";
// ✅ 官方专用查询接口（你最新提供！核心修复）
const QUERY_API = "https://api.302.ai/doubao/drawing/jimeng_ti2v_v30_pro_result";

// 提示词 + 官方参数
const VIDEO_PROMPT = "将参考图片生成视频 视频要从侧面开始 转动到正上方 再转动到另一边的正侧方 再转到正脸 最后视频推近展示脸部特写 转动过程中脸要始终在画面里呈现 不要背对画面 丝滑蓬松长发 皮肤白净无杂色 小幅转动 流畅运镜 柔和光影 石膏质感";
const VIDEO_CONFIG = { frames: 121, aspect_ratio: "1:1" };

// ====================== 工具 ======================
const fileInput = document.getElementById("fileInput");
const startBtn = document.getElementById("startBtn");
const logBox = document.getElementById("log");
const resultBox = document.getElementById("result");

function log(text) {
  logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}

// ====================== 1. 官方文件上传 ======================
async function uploadFile(file) {
  log("📤 上传图片到官方接口...");
  const form = new FormData();
  form.append("file", file);

  const res = await fetch(UPLOAD_API, {
    method: "POST",
    headers: { Authorization: `Bearer ${API_KEY}` },
    body: form
  });

  const data = await res.json();
  if (data.code !== 200) throw new Error(data.message);
  log(`✅ 获取图片URL：${data.data}`);
  return data.data;
}

// ====================== 2. 提交视频任务 ======================
async function createTask(imgUrl) {
  log("🚀 提交即梦3.0 Pro任务...");
  const res = await fetch(VIDEO_API, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt: VIDEO_PROMPT,
      image_urls: [imgUrl],
      frames: VIDEO_CONFIG.frames,
      aspect_ratio: VIDEO_CONFIG.aspect_ratio
    })
  });

  const data = await res.json();
  const taskId = data?.data?.task_id;
  if (!taskId) throw new Error("任务提交失败：" + JSON.stringify(data));
  log(`✅ 任务提交成功，任务ID：${taskId}`);
  return taskId;
}

// ====================== 3. ✅ 官方专用查询任务（核心修复）======================
async function queryTask(taskId) {
  log("🔍 查询任务状态（官方专用接口）...");
  const res = await fetch(QUERY_API, {
    method: "POST", // 官方要求POST！
    headers: {
      Authorization: `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ task_id: taskId }) // 只传task_id即可
  });

  const data = await res.json();
  log(`查询返回：${data.data.status}`);
  return data;
}

// ====================== 4. 自动轮询（极简稳定）======================
async function waitVideo(taskId) {
  for (let i = 0; i < 15; i++) {
    await new Promise(r => setTimeout(r, 4000)); // 每4秒查1次
    const res = await queryTask(taskId);
    const status = res.data.status;

    if (status === "succeeded") {
      const videoUrl = res.data.video_url; // ✅ 官方返回字段：video_url
      log(`✅ 视频生成完成！`);
      return videoUrl;
    }
    if (status === "failed") throw new Error("视频生成失败");
  }
  throw new Error("生成超时");
}

// ====================== 启动 ======================
fileInput.addEventListener("change", () => startBtn.disabled = !fileInput.files[0]);
startBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  startBtn.disabled = true;
  resultBox.innerHTML = "";

  try {
    const imgUrl = await uploadFile(file);
    const taskId = await createTask(imgUrl);
    const videoUrl = await waitVideo(taskId);

    resultBox.innerHTML = `
      <p class="text-green-600 font-bold">✅ 生成成功！</p>
      <video controls class="w-full rounded mt-2">
        <source src="${videoUrl}" type="video/mp4">
      </video>
      <a href="${videoUrl}" target="_blank" class="text-blue-500">打开视频</a>
    `;
    log("🎉 全部流程完成！");
  } catch (e) {
    log(`❌ 失败：${e.message}`);
    resultBox.innerHTML = `<p class="text-red-600">失败：${e.message}</p>`;
  } finally {
    startBtn.disabled = false;
  }
});
</script>
</body>
</html>
