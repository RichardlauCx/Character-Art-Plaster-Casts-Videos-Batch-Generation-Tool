<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【纯视频调试】即梦V3.0 图生视频</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: monospace}
        body{padding:20px;background:#f5f5f5;max-width:800px;margin:0 auto}
        .box{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
        button{padding:10px 20px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:0 5px}
        button:disabled{background:#ccc}
        #log{background:#f8f9fa;padding:15px;height:400px;overflow-y:auto;border-radius:8px;white-space:pre-wrap}
        .result{margin-top:15px;padding:10px;border:1px solid #ddd;border-radius:6px}
        video{max-width:300px;margin-top:10px;border-radius:8px}
    </style>
</head>
<body>
    <div class="box">
        <h3>🎥 纯视频调试（无图生图，省额度）</h3>
        <input type="file" id="file" accept="image/*" style="margin:15px 0">
        <button id="start">开始生成视频</button>
        <button id="clear">清空日志</button>
    </div>

    <div class="box">
        <h3>📝 全量调试日志</h3>
        <div id="log"></div>
    </div>

    <div id="result"></div>

<script>
// ====================== 【核心配置 · 100%对齐官方OpenAPI】======================
const API_KEY = "sk-zI5dAbQjuJZQboKJp8pwE6lStKLOn7kUR2X9SBATVnSXP2f0";
const BASE = "https://api.302.ai";

// 视频接口（官方文档）
const VIDEO_API = `${BASE}/doubao/drawing/jimengv30`;
const QUERY_API = `${BASE}/doubao/drawing/query_task`;

// 官方必传参数
const CONFIG = {
  req_key: "jimeng_i2v_first_v30",    // 720P 图生视频首帧（官方枚举）
  prompt: "石膏质感人物，流畅运镜，无抖动，无水印", // 精简提示词
  seed: -1,                           // 随机种子（官方默认）
  frames: 121                         // 5秒（官方固定值：24*5+1）
};

// ====================== 【日志工具】======================
const log = (msg) => {
  const t = new Date().toLocaleTimeString();
  document.getElementById("log").innerHTML += `[${t}] ${msg}\n`;
  document.getElementById("log").scrollTop = 999999;
  console.log(`[${t}]`, msg);
};

// ====================== 【1. 本地图片转Base64】======================
const fileToBase64 = (file) => {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
};

// ====================== 【2. 核心：创建视频任务】======================
const createVideoTask = async (base64) => {
  log("→ 调用视频接口：创建任务");
  // 严格按照 OpenAPI 构造请求体
  const body = {
    req_key: CONFIG.req_key,
    prompt: CONFIG.prompt,
    seed: CONFIG.seed,
    frames: CONFIG.frames,
    image_urls: [base64] // 官方要求：数组格式
  };

  log(`请求参数：${JSON.stringify(body, null, 2)}`);

  const resp = await fetch(VIDEO_API, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const data = await resp.json();
  log(`接口返回：${JSON.stringify(data, null, 2)}`);

  if (data.code !== 10000 || !data.data?.task_id) {
    throw new Error("任务创建失败");
  }

  const task_id = data.data.task_id;
  log(`✅ 任务创建成功！task_id: ${task_id}`);
  return task_id;
};

// ====================== 【3. 核心：轮询查询任务】======================
const waitVideoResult = async (task_id) => {
  log("→ 开始轮询任务状态（最多30次/90秒）");
  
  for (let i=1; i<=30; i++) {
    await new Promise(r => setTimeout(r, 3000));
    log(`轮询 ${i}/30`);

    try {
      const resp = await fetch(QUERY_API, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ task_id })
      });

      const data = await resp.json();
      log(`轮询返回：${JSON.stringify(data, null, 2)}`);

      // 成功：返回视频地址
      if (data.code === 10000 && data.data?.video_url) {
        log("🎉 视频生成完成！");
        return data.data.video_url;
      }

      // 失败
      if (data.data?.status === "failed") {
        throw new Error("任务执行失败");
      }

    } catch (e) {
      log(`⚠️ 轮询异常：${e.message}，继续重试`);
    }
  }
  throw new Error("任务超时");
};

// ====================== 【主流程：一键执行】======================
document.getElementById("start").onclick = async () => {
  const file = document.getElementById("file").files[0];
  if (!file) { alert("请选择图片"); return; }

  document.getElementById("start").disabled = true;
  document.getElementById("start").innerText = "处理中...";
  document.getElementById("result").innerHTML = "";

  try {
    log("=== 开始纯视频调试流程 ===");
    const base64 = await fileToBase64(file);
    const task_id = await createVideoTask(base64);
    const video_url = await waitVideoResult(task_id);
    
    document.getElementById("result").innerHTML = `
      <div class="result">
        ✅ 视频生成成功<br>
        <video src="${video_url}" controls muted></video>
      </div>
    `;
    log("=== 全流程完成 ===");
  } catch (e) {
    log(`❌ 失败：${e.message}`);
    document.getElementById("result").innerHTML = `<div class="result">❌ 失败：${e.message}</div>`;
  }

  document.getElementById("start").disabled = false;
  document.getElementById("start").innerText = "开始生成视频";
};

// 清空日志
document.getElementById("clear").onclick = () => {
  document.getElementById("log").innerHTML = "";
  document.getElementById("result").innerHTML = "";
};
</script>
</body>
</html>
